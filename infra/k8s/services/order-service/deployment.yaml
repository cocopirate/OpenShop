apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: openshop
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: openshop/order-service:latest
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: openshop-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openshop-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: openshop-secrets
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
